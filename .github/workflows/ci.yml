name: CI

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Python
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer flake8
        run: pip install flake8
      - name: Linter Python
        run: flake8 azure-vote/main.py --max-line-length=120

  security:
    runs-on: ubuntu-latest
    name: Sécurité du code
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer bandit
        run: pip install bandit
      - name: Scan sécurité (bandit)
        run: bandit -r azure-vote/main.py --severity-level high

  safety:
    runs-on: ubuntu-latest
    name: Sécurité des dépendances
    needs: lint

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Installer safety
        run: pip install safety

      - name: Scan des dépendances
        run: safety check -r azure-vote/requirements.txt --ignore 70612

  hadolint:
    runs-on: ubuntu-latest
    name: Lint Dockerfile

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  trivy:
    runs-on: ubuntu-latest
    name: Scan vulnérabilités image
    needs: build-and-push

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push
    needs: security

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest .

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest

      - name: Docker Push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
