name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest .

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest

      - name: Docker Push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
