name: CI

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Python
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer flake8
        run: pip install flake8
      - name: Linter Python
        run: flake8 azure-vote/main.py --max-line-length=120

  security:
    runs-on: ubuntu-latest
    name: Sécurité du code
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer bandit
        run: pip install bandit
      - name: Scan sécurité (bandit)
        run: bandit -r azure-vote/main.py --severity-level high

  safety:
    runs-on: ubuntu-latest
    name: Sécurité des dépendances
    needs: lint

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Installer safety
        run: pip install safety

      - name: Scan des dépendances
        run: safety check -r azure-vote/requirements.txt --ignore 70612

  hadolint:
    runs-on: ubuntu-latest
    name: Lint Dockerfile

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  trivy:
    runs-on: ubuntu-latest
    name: Scan vulnérabilités image
    needs: build-and-push

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  integration-test:
    runs-on: ubuntu-latest
    name: Tests d'intégration
    needs: build-and-push

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancer docker-compose
        run: docker compose up -d

      - name: Attendre que l'app démarre
        run: sleep 10

      - name: Test - vérifier que l'app répond
        run: curl -f http://localhost:8080

      - name: Test - simuler un vote Cats
        run: curl -f -X POST http://localhost:8080 -d "vote=Cats"

      - name: Test - simuler un vote Dogs
        run: curl -f -X POST http://localhost:8080 -d "vote=Dogs"

      - name: Stopper docker-compose
        run: docker compose down

  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push
    needs: security

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest .

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest

      - name: Docker Push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest

  healthcheck-test:
    runs-on: ubuntu-latest
    name: Test Healthcheck
    needs: integration-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancer docker-compose
        run: docker compose up -d

      - name: Attendre que le healthcheck passe
        run: |
          sleep 60
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' voting-app-azure-vote-front-1)
          echo "Healthcheck status: $STATUS"
          if [ "$STATUS" != "healthy" ]; then
            echo "Container not healthy!"
            exit 1
          fi

      - name: Stopper docker-compose
        run: docker compose down

  load-test:
    runs-on: ubuntu-latest
    name: Test de charge k6
    needs: healthcheck-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancer docker-compose
        run: docker compose up -d

      - name: Attendre que l'app démarre
        run: sleep 10

      - name: Installer k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Lancer le test de charge
        run: k6 run tests/load-test.js

      - name: Stopper docker-compose
        run: docker compose down
