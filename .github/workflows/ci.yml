name: CI

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Python
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer flake8
        run: pip install flake8
      - name: Linter Python
        run: flake8 azure-vote/main.py --max-line-length=120

  security:
    runs-on: ubuntu-latest
    name: Sécurité du code
    needs: lint
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Installer bandit
        run: pip install bandit
      - name: Scan sécurité (bandit)
        run: bandit -r azure-vote/main.py --severity-level high

  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push
    needs: security

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest .

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest

      - name: Docker Push
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
